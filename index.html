<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Letter to My Kohinoor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@300;400;500&family=Amiri:ital@0;1&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Allura&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-pink: #FFF5F7;
            --soft-blush: #FCE7F3;
            --madam-gold: #D4AF37;
            --text-dark: #4A4E69;
            --text-romantic: #6B4E71;
            --lavender-mist: #F3E8FF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--primary-pink);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            color: var(--text-dark);
            -webkit-tap-highlight-color: transparent;
        }

        .font-arabic { font-family: 'Amiri', serif; }
        .font-romantic { font-family: 'Dancing Script', cursive; }
        .font-signature { font-family: 'Allura', cursive; }
        .font-premium { font-family: 'Playfair Display', serif; }

        /* Madam Highlight - Golden Glow Only for this word */
        .madam-highlight {
            color: var(--madam-gold);
            font-weight: 700;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.5);
            display: inline-block;
        }

        /* Falling Hearts Animation */
        #hearts-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .heart-particle {
            position: absolute;
            bottom: -20px;
            fill: #FBCFE8;
            opacity: 0.5;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(0) rotate(0deg); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
        }

        /* Glass Card Styling */
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.03);
            width: 90%;
            max-width: 440px;
            padding: 2.5rem 2rem;
            border-radius: 2.5rem;
            text-align: center;
            position: relative;
            z-index: 10;
            margin: auto;
        }

        /* Typewriter Cursor */
        .cursor {
            display: inline-block;
            width: 2px;
            height: 1.1em;
            background: #F9A8D4;
            margin-left: 3px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        @keyframes blink { 50% { opacity: 0; } }

        /* Islamic Button Style */
        .btn-islamic {
            background: white;
            color: var(--text-romantic);
            padding: 0.9rem 2.2rem;
            border-radius: 9999px;
            border: 1px solid var(--soft-blush);
            font-weight: 500;
            transition: all 0.6s cubic-bezier(0.22, 1, 0.36, 1);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(219, 39, 119, 0.05);
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            opacity: 0;
            transform: translateY(10px);
        }

        .btn-islamic.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-islamic:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 15px 30px rgba(219, 39, 119, 0.12);
            border-color: #F9A8D4;
            color: #DB2777;
        }

        /* Signature Pad */
        #sig-canvas {
            background: white;
            border: 1px dashed #FBCFE8;
            border-radius: 1.5rem;
            cursor: crosshair;
            touch-action: none;
            width: 100%;
            height: 140px;
        }

        /* Transitions */
        .fade-content {
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .countdown-item {
            background: white;
            padding: 0.8rem;
            border-radius: 1.2rem;
            border: 1px solid var(--soft-blush);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.01);
        }

        .dua-item {
            opacity: 0;
            transition: opacity 2s ease;
        }
        .dua-item.active { opacity: 1; }

        .btn-romantic {
            background: linear-gradient(135deg, #fce7f3 0%, #f9a8d4 100%);
            color: #6b4e71;
            padding: 0.8rem 1.8rem;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 14px;
            box-shadow: 0 4px 15px rgba(249, 168, 212, 0.4);
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            border: 1px solid rgba(255, 255, 255, 0.5);
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .btn-romantic:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 10px 25px rgba(249, 168, 212, 0.6);
            background: linear-gradient(135deg, #f9a8d4 0%, #f472b6 100%);
            color: white;
        }

        .btn-romantic::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
            z-index: -1;
        }

        .btn-romantic:hover::before {
            left: 100%;
        }

        @media (max-width: 380px) {
            .glass-card { padding: 2rem 1.5rem; }
            h1 { font-size: 1.8rem !important; }
        }
    </style>

        let currentPage = 0;

        function createHearts() {
            const container = document.getElementById('hearts-container');
            for(let i=0; i<30; i++) {
                const heart = document.createElementNS("http://www.w3.org/2000/svg", "svg");
                heart.setAttribute("viewBox", "0 0 24 24");
                heart.classList.add("heart-particle");
                heart.innerHTML = `<path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>`;

                heart.style.width = (10 + Math.random() * 20) + 'px';
                heart.style.animationDuration = (15 + Math.random() * 20) + 's';
                heart.style.animationDelay = (Math.random() * 20) + 's';
                container.appendChild(heart);
            }
        }

        async function typeText(element, text) {
            isTyping = true;
            element.innerHTML = '';
            const cursor = document.createElement('span');
            cursor.className = 'cursor';
            
            let displayed = "";
            for (let i = 0; i < text.length; i++) {
                displayed += text[i];
                // Replace "Madam" with the golden glow span
                let html = displayed.replace(/Madam/g, '<span class="madam-highlight">Madam</span>');
                element.innerHTML = html;
                element.appendChild(cursor);
                
                let delay = 40 + Math.random() * 30;
                if (['.', '?', '!'].includes(text[i])) delay = 700;
                else if (text[i] === ',') delay = 350;
                
                await new Promise(r => setTimeout(r, delay));
            }
            cursor.remove();
            isTyping = false;
            document.querySelectorAll('.btn-islamic').forEach(btn => btn.classList.add('visible'));
        }

        function initSignaturePad() {
            const canvas = document.getElementById('sig-canvas');
            const ctx = canvas.getContext('2d');
            const btn = document.getElementById('finalize-btn');
            let drawing = false;

            const getPos = (e) => {
                const rect = canvas.getBoundingClientRect();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                return { x: clientX - rect.left, y: clientY - rect.top };
            };

            const start = (e) => { drawing = true; ctx.beginPath(); const {x,y} = getPos(e); ctx.moveTo(x,y); };
            const stop = () => { drawing = false; btn.disabled = false; btn.classList.remove('opacity-40'); btn.classList.add('visible'); };
            const move = (e) => {
                if(!drawing) return;
                const {x,y} = getPos(e);
                ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#4A4E69';
                ctx.lineTo(x, y); ctx.stroke();
            };

            canvas.addEventListener('mousedown', start); canvas.addEventListener('mousemove', move); window.addEventListener('mouseup', stop);
            canvas.addEventListener('touchstart', start, {passive:false}); canvas.addEventListener('touchmove', move, {passive:false}); canvas.addEventListener('touchend', stop);
        }

                        <h3 class="text-[9px] uppercase tracking-widest text-pink-300 font-bold mb-4">Countdown to 32 September (Symbolic)</h3>
                        <div id="timer" class="grid grid-cols-3 gap-2"></div>
                        
                        <div class="mt-6 flex justify-center">
                            <a href="https://tally.so/r/44kEVd" target="_blank" class="btn-romantic">

                    </div>

                    <div class="border-t border-pink-50 pt-6 mt-6">
                        <p class="font-romantic text-2xl text-slate-700">Eid Mubarak, my everything.</p>
                        <p class="text-[9px] text-pink-300 uppercase tracking-widest font-bold mt-3">With Purest Intention, Rafe</p>
                    </div>
                </div>
            `;
            startCountdown();
            startDuaCycle();
        }

        function startCountdown() {
            const target = new Date();
            target.setFullYear(target.getFullYear() + 5);
            target.setMonth(target.getMonth() + 7);
            
            const timer = document.getElementById('timer');
            function update() {
                const now = new Date();
                let diff = target - now;
                const years = Math.floor(diff / (1000 * 60 * 60 * 24 * 365));
                const months = Math.floor((diff % (1000 * 60 * 60 * 24 * 365)) / (1000 * 60 * 60 * 24 * 30));
                const days = Math.floor((diff % (1000 * 60 * 60 * 24 * 30)) / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const mins = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const secs = Math.floor((diff % (1000 * 60)) / 1000);

                const data = [
                    {l:'Years', v:years}, {l:'Months', v:months}, {l:'Days', v:days},
                    {l:'Hrs', v:hours}, {l:'Mins', v:mins}, {l:'Secs', v:secs}
                ];

                timer.innerHTML = data.map(i => `
                    <div class="countdown-item flex flex-col items-center">
                        <span class="text-xl font-light text-slate-700 tabular-nums">${String(i.v).padStart(2,'0')}</span>
                        <span class="text-[7px] uppercase tracking-tighter text-pink-300 font-bold">${i.l}</span>
                    </div>
                `).join('');
            }
            update();
            setInterval(update, 1000);
        }

        function startDuaCycle() {
            const display = document.getElementById('dua-display');
            let i = 0;
            function next() {
                display.innerHTML = `<p class="dua-item text-[13px] text-slate-500 italic text-center px-4 leading-relaxed">${DUAS[i]}</p>`;
                setTimeout(() => {
                    display.querySelector('p').classList.add('active');
                }, 100);
                i = (i + 1) % DUAS.length;
            }
            next();
            setInterval(next, 6000);
        }

        function nextPage() {
            if (isTyping) return;
            if (currentPage < PAGES.length - 1) {
                currentPage++;
                renderPage();
            } else {
                renderFinal();
            }
        }

        function prevPage() {
            if (isTyping) return;
            if (currentPage > 0) {
                currentPage--;
                renderPage();
            }
        }

        // Initialize
        createHearts();
        renderPage();
    </script>
<script type="module" src="/index.tsx"></script>
</body>
</html>
